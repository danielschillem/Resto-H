services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: resto_db
      POSTGRES_USER: resto_user
      POSTGRES_PASSWORD: resto_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resto_user -d resto_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: Resto-H
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "base64:K4OZcDpmlVmbcV17Th0oK8ygXMY7wT+84Oj4EOniMPs="
      APP_URL: "http://${SERVER_IP:-localhost}"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: resto_db
      DB_USERNAME: resto_user
      DB_PASSWORD: resto_secret
      DB_SSLMODE: disable
      SESSION_DRIVER: cookie
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stderr
      BCRYPT_ROUNDS: 12
      FRONTEND_URL: "http://${SERVER_IP:-localhost}"
      SANCTUM_STATEFUL_DOMAINS: "${SERVER_IP:-localhost}"
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "/api"
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
