[build]
  base = "frontend"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_WEBPACK = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers CORS/sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
